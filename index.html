<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Spelling Bee</title>
    <style>
        /* CSS: Visual Design */
        body {
            background-color: #2C3E50;
            color: #ECF0F1;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* FIX: Allow scrolling on very tiny screens instead of cutting things off */
            overflow-y: auto; 
            overflow-x: hidden;
        }
        .top-bar {
            background-color: #34495E;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; 
        }
        button {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }
        .btn-nav { background-color: #2980B9; }
        .btn-action { background-color: #E74C3C; }
        .btn-special { background-color: #8E44AD; } 
        button:hover { opacity: 0.8; }
        
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px; 
        }
        #instruction { font-size: 24px; margin-bottom: 20px; }
        #timer { font-size: 80px; font-family: monospace; font-weight: bold; color: #F1C40F; margin: 20px 0; }
        
        #word-display { 
            font-size: clamp(35px, 10vw, 100px); 
            font-weight: bold; 
            color: #2ECC71; 
            letter-spacing: 5px; 
            word-wrap: break-word; 
            max-width: 100%;
        }
        
        .bottom-bar {
            background-color: #34495E;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        #progress-text { font-size: 20px; font-weight: bold; text-align: center; }

        /* --- MOBILE PHONE LAYOUT SETTINGS --- */
        @media (max-width: 600px) {
            .top-bar {
                gap: 8px;
                padding: 10px;
            }
            .top-bar button {
                font-size: 14px; 
                padding: 8px 10px;
                flex-grow: 1; 
            }
            #instruction { font-size: 18px; margin-bottom: 10px;}
            #timer { font-size: 60px; margin: 10px 0; }
            #word-display { letter-spacing: 2px; }
            
            /* FIX: Keep bottom bar in a row, just make everything smaller to fit */
            .bottom-bar {
                padding: 10px;
            }
            .bottom-bar button {
                font-size: 13px;
                padding: 8px 10px;
            }
            #progress-text { 
                font-size: 15px; 
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-nav" onclick="startRound()">Start / Restart</button>
        <button class="btn-nav" onclick="pauseTimer()">Pause</button>
        <button class="btn-nav" onclick="resumeTimer()">Resume</button>
        <button class="btn-action" onclick="playAudio()">Replay Audio</button>
        <button class="btn-nav" onclick="toggleAutoVoice()" id="auto-btn">Auto-Voice: ON</button>
        <button class="btn-special" onclick="randomizeWords()">Randomise</button>
    </div>

    <div class="main-content">
        <div id="instruction">Press Start to Begin</div>
        <div id="timer">00</div>
        <div id="word-display">???</div>
    </div>

    <div class="bottom-bar">
        <button class="btn-nav" onclick="prevWord()">&lt; Prev</button>
        <div id="progress-text">Word 1 of 200</div>
        <button class="btn-nav" onclick="nextWordManual()">Next &gt;</button>
    </div>

    <script>
        const words = [
            "accident", "address", "adventure", "aeroplane", "afternoon", "alphabet", "animal", "autumn",
            "balloon", "banana", "basket", "beautiful", "bicycle", "biscuit", "blanket", "bookshelf", "borrow", "breakfast", "bridge",
            "cabbage", "calendar", "camera", "castle", "ceiling", "centre", "century", "champion", "character", "chemist", "chocolate", "cinema", "comfortable", "cupboard",
            "danger", "daughter", "decide", "dentist", "diary", "dictionary", "difference", "dinosaur", "direction",
            "elephant", "engine", "engineer", "envelope", "environment", "especially", "evening", "exercise", "exhibition",
            "factory", "family", "famous", "fantastic", "favourite", "feather", "festival", "furniture", "future",
            "garage", "garden", "geography", "ghost", "giraffe", "grammar",
            "happen", "headache", "helicopter", "history", "holiday", "hospital",
            "important", "improve", "information", "insect", "instrument", "island",
            "jacket", "journey", "juice", "jumper", "jungle", "justice",
            "kangaroo", "keyboard", "kilometre", "kitchen", "kitten", "knowledge",
            "language", "lesson", "library", "listen", "luggage", "lunch",
            "machine", "magazine", "mathematics", "medicine", "message", "monkey", "mountain", "museum",
            "national", "nature", "necklace", "neighbour", "newspaper", "number",
            "ocean", "office", "omelette", "opposite", "orange", "ordinary", "outside", "oven",
            "passenger", "passport", "penguin", "people", "perfect", "photograph", "picture", "popular", "potato",
            "quarter", "queen", "question", "quick",
            "railway", "receive", "receipt", "remember", "restaurant", "return", "rucksack", "ruler",
            "sandwich", "sausage", "science", "scissors", "screen", "season", "secret", "sentence", "shoulder", "skeleton", "soldier", "stomach", "straight", "student", "subject",
            "telephone", "television", "temperature", "theatre", "thirsty", "ticket", "tomorrow", "tongue", "traffic", "trousers",
            "umbrella", "uncle", "understand", "unhappy", "uniform", "university", "until", "usually",
            "vacuum", "valley", "vegetable", "village", "violin", "visitor", "voice", "volcano",
            "weather", "website", "Wednesday", "weight", "whisper", "whistle", "window", "winter", "wonderful", "write",
            "x-ray", "xylophone",
            "yellow", "yesterday", "yoghurt", "young", "yourself",
            "zebra", "zero", "zoo"
        ];

        let currentIndex = 0;
        let timeLeft = 0;
        const timerDuration = 28;
        let isPaused = false;
        let autoVoice = true;
        let timerInterval;
        let waitTimeout;

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        function updateUI() {
            document.getElementById('progress-text').innerText = `Word ${currentIndex + 1} of ${words.length}`;
        }

        function toggleAutoVoice() {
            autoVoice = !autoVoice;
            document.getElementById('auto-btn').innerText = `Auto-Voice: ${autoVoice ? 'ON' : 'OFF'}`;
        }

        function randomizeWords() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]]; 
            }
            
            currentIndex = 0;
            clearInterval(timerInterval);
            clearTimeout(waitTimeout);
            isPaused = false;
            
            document.getElementById('word-display').innerText = "???";
            document.getElementById('timer').innerText = "00";
            document.getElementById('timer').style.color = "#F1C40F";
            document.getElementById('instruction').innerText = "Words Randomised! Press Start to Begin.";
            
            updateUI();
        }

        function startRound() {
            clearInterval(timerInterval);
            clearTimeout(waitTimeout);
            isPaused = false;
            timeLeft = timerDuration;
            
            const currentWord = words[currentIndex];
            document.getElementById('word-display').innerText = "?".repeat(currentWord.length);
            document.getElementById('instruction').innerText = "Listen to the word and write it down!";
            
            let timerDisplay = document.getElementById('timer');
            timerDisplay.innerText = "--";
            timerDisplay.style.color = "#F1C40F";

            updateUI();

            if (autoVoice) {
                playAudio();
                setTimeout(runTimer, 1500); 
            } else {
                runTimer();
            }
        }

        function playAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(words[currentIndex]);
                let voices = window.speechSynthesis.getVoices();
                let gbVoice = voices.find(v => v.lang === 'en-GB' || v.name.includes('UK') || v.name.includes('British'));
                if (gbVoice) {
                    msg.voice = gbVoice;
                }
                msg.rate = 0.8; 
                window.speechSynthesis.speak(msg);
            } else {
                alert("Sorry, your browser does not support text-to-speech.");
            }
        }

        function runTimer() {
            if (isPaused) return;
            let timerDisplay = document.getElementById('timer');
            timerDisplay.innerText = timeLeft < 10 ? "0" + timeLeft : timeLeft;
            
            if (timeLeft <= 5) {
                timerDisplay.style.color = "#E74C3C"; 
            }
            
            if (timeLeft > 0) {
                timeLeft--;
                timerInterval = setTimeout(runTimer, 1000);
            } else {
                revealWord();
            }
        }

        function pauseTimer() {
            isPaused = true;
        }

        function resumeTimer() {
            if (isPaused && timeLeft > 0) {
                isPaused = false;
                runTimer();
            }
        }

        function revealWord() {
            clearInterval(timerInterval);
            document.getElementById('word-display').innerText = words[currentIndex];
            document.getElementById('instruction').innerText = "Check your spelling!";
            
            let timerDisplay = document.getElementById('timer');
            timerDisplay.innerText = "TIME'S UP";
            timerDisplay.style.color = "#2ECC71";

            waitTimeout = setTimeout(nextWordAuto, 5000);
        }

        function nextWordAuto() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                startRound();
            } else {
                document.getElementById('instruction').innerText = "Spelling Bee Complete! Well done!";
                document.getElementById('word-display').innerText = "🏆";
                document.getElementById('timer').innerText = "";
            }
        }

        function nextWordManual() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                startRound();
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                startRound();
            }
        }

        updateUI();
    </script>
</body>
</html>
